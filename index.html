<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>相場観ツール</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: linear-gradient(135deg, #0f2544 0%, #1a3f7c 50%, #2557a7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 52px 44px 44px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .brand {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 8px;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #2557a7, #1a3f7c);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 22px; height: 22px; fill: #fff; }
    .brand-name { font-size: 13px; font-weight: 600; color: #6b7280; letter-spacing: 0.05em; }
    h1 { font-size: 22px; font-weight: 700; color: #111827; margin: 4px 0 6px; }
    .subtitle { font-size: 13px; color: #6b7280; line-height: 1.6; margin-bottom: 32px; }

    .state { display: none; }
    .state.active { display: block; }

    /* Loading */
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e5e7eb; border-top-color: #2557a7;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #6b7280; padding-bottom: 8px; }

    /* Form */
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: #374151; text-align: left; margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #d1d5db; border-radius: 10px;
      font-size: 14px; color: #111827;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #2557a7; box-shadow: 0 0 0 3px rgba(37,87,167,0.1); }
    .form-hint { font-size: 11px; color: #9ca3af; text-align: left; margin-top: 5px; margin-bottom: 20px; }
    .btn {
      display: block; width: 100%; padding: 13px;
      background: #2557a7; color: #fff; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #1a3f7c; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }

    /* Redirect */
    .success-icon {
      width: 60px; height: 60px; background: #d1fae5; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; font-size: 28px;
    }
    .success-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #059669; margin-bottom: 6px; }
    .success-title { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .success-sub { font-size: 13px; color: #6b7280; line-height: 1.6; margin-bottom: 18px; }
    .progress-bar-wrap { background: #e5e7eb; border-radius: 9999px; height: 4px; overflow: hidden; margin-bottom: 14px; }
    .progress-bar { height: 4px; background: #2557a7; border-radius: 9999px; animation: progress 1.5s ease forwards; }
    @keyframes progress { from { width: 0%; } to { width: 100%; } }
    .manual-link { font-size: 12px; color: #2557a7; text-decoration: none; }
    .manual-link:hover { text-decoration: underline; }

    /* Error */
    .error-icon { font-size: 40px; margin-bottom: 12px; }
    .error-title { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    .error-msg { font-size: 13px; color: #6b7280; line-height: 1.7; white-space: pre-wrap; margin-bottom: 16px; }
    .email-tag { display: inline-block; background: #f3f4f6; border-radius: 6px; padding: 3px 10px; font-size: 12px; color: #374151; font-family: monospace; margin-bottom: 20px; }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border: 1.5px solid #d1d5db; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: #374151; background: #fff;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-outline:hover { background: #f9fafb; }

    /* Saved badge */
    .saved-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #eff6ff; color: #2557a7; border-radius: 20px;
      padding: 4px 12px; font-size: 11px; font-weight: 600;
      margin-bottom: 16px; border: 1px solid #bfdbfe;
    }

    .card-footer { margin-top: 28px; padding-top: 20px; border-top: 1px solid #f3f4f6; font-size: 11px; color: #9ca3af; }
  </style>
</head>

    <a class="manual-link" id="redirect-link" href="#" target="_blank">自動で移動しない場合はこちら →</a>
  </div>

  <!-- Error -->
  <div id="state-error" class="state">
    <div class="error-icon">🔒</div>
    <p class="error-title">アクセスできません</p>
    <p class="error-msg" id="error-msg"></p>
    <p class="email-tag" id="error-email"></p>

      別のメールアドレスで試す

  </div>

  <div class="card-footer">アクセス申請は担当者までお問い合わせください</div>
</div>

// ── UI helpers ──────────────────────────────────────────
function showState(id) {
  document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showRedirect(url, label) {
  document.getElementById('redirect-title').textContent = label;
  document.getElementById('redirect-sub').textContent   = '1〜2秒後に自動でリダイレクトします';
  document.getElementById('redirect-link').href         = url;
  showState('state-redirect');
  setTimeout(() => { window.location.href = url; }, 1500);
}

function showError(msg, email) {
  document.getElementById('error-msg').textContent = msg;
  const tag = document.getElementById('error-email');
  tag.textContent = email || '';
  tag.style.display = email ? 'inline-block' : 'none';
  showState('state-error');
}

function resetAndShowForm() {
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('emailInput').value = '';
  document.getElementById('saved-badge-wrap').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = 'ダッシュボードを開く →';
  showState('state-form');
}

// ── Redirect logic ──────────────────────────────────────
function doRedirect(email) {
  const normalized = email.trim().toLowerCase();
  if (!normalized) { showError('メールアドレスが入力されていません。', ''); return; }

  if (normalized.endsWith('@indeed.com')) {
    localStorage.setItem(STORAGE_KEY, normalized);
    showRedirect(URL_INTERNAL, '社内用ダッシュボードに移動中');
    return;
  }

  const tool = EMAIL_MAP[normalized];
  if (tool === 'A') {
    localStorage.setItem(STORAGE_KEY, normalized);
    showRedirect(URL_TOOL_A, '相場観ツールA に移動中');
  } else if (tool === 'B') {
    localStorage.setItem(STORAGE_KEY, normalized);
    showRedirect(URL_TOOL_B, '相場観ツールB に移動中');
  } else {
    showError('このメールアドレスにはアクセス権限が付与されていません。\n担当者にご連絡ください。', normalized);
  }
}

// ── Form submit ─────────────────────────────────────────
function submitEmail() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email) { document.getElementById('emailInput').focus(); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '確認中...';
  showState('state-loading');
  setTimeout(() => doRedirect(email), 300);
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('emailInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitEmail();
  });

  // localStorage に保存済みのメールがあれば自動リダイレクト
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    document.getElementById('subtitle-text').textContent = '前回のアカウントで自動的に移動します';
    document.getElementById('saved-badge-wrap').style.display = 'block';
    document.getElementById('emailInput').value = saved;
    setTimeout(() => doRedirect(saved), 800);
  } else {
    showState('state-form');
  }
});
</script>
